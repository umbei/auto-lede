#
# 使用 Lean's LEDE 源码通过 GitHub Actions 自动编译 OpenWrt 固件
# 项目模板: P3TERX/Actions-OpenWrt
# 源码仓库: coolsnowwolf/lede
#

name: build_x86

# 触发方式：手动触发为主，也可按需添加定时或代码推送触发
on:
  workflow_dispatch:
    inputs:
      ssh:
        description: '是否开启 SSH 调试模式'
        required: false
        default: 'false'

# 环境变量配置
env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false          # 是否上传完整的 bin 目录 (文件较大，通常设为 false)
  UPLOAD_FIRMWARE: true          # 是否上传生成的固件
  UPLOAD_RELEASE: false          # 是否上传到 GitHub Releases
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 检出仓库代码
      uses: actions/checkout@v4

    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt update -y
        sudo apt full-upgrade -y
        sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
        bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext \
        genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev \
        libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev \
        libreadline-dev libssl-dev libtool llvm lrzsz libnsl-dev ninja-build p7zip p7zip-full patch pkgconf \
        python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion \
        swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev

    - name: 克隆 Lean's LEDE 源码
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt

    - name: 优化磁盘空间并建立缓存目录软链接
      run: |
        sudo mkdir -p /mnt/openwrt/dl /mnt/openwrt/bin /mnt/openwrt/staging_dir
        sudo chown -R $USER:$GROUPS /mnt/openwrt
        cd openwrt
        ln -sf /mnt/openwrt/dl dl
        ln -sf /mnt/openwrt/bin bin
        ln -sf /mnt/openwrt/staging_dir staging_dir

    - name: 缓存编译依赖与中间文件
      uses: actions/cache@v4
      with:
        path: |
          /mnt/openwrt/dl
          /mnt/openwrt/staging_dir
        key: ${{ runner.os }}-openwrt-${{ hashFiles('openwrt/.config') }}
        restore-keys: |
          ${{ runner.os }}-openwrt-

    - name: 加载自定义 feeds 配置
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 更新 feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: 安装 feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: 加载自定义固件配置
      run: |
        [ -d files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: SSH 远程调试 (可选)
      uses: P3TERX/ssh2actions@v1.0.0
      if: github.event.inputs.ssh == 'true'
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    - name: 下载软件包
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      id: compile
      run: |
        cd openwrt
        rm -rf tmp/
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        # 提取设备名称，用于命名产物
        BOARD=$(grep '^CONFIG_TARGET_BOARD=' .config | cut -d'=' -f2 | tr -d '"')
        SUBTARGET=$(grep '^CONFIG_TARGET_SUBTARGET=' .config | cut -d'=' -f2 | tr -d '"')
        DEVICE=$(grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/')
        if [ -n "$DEVICE" ]; then
          DEVICE_NAME="_${BOARD}_${SUBTARGET}_${DEVICE}"
        elif [ -n "$BOARD" ]; then
          DEVICE_NAME="_${BOARD}_${SUBTARGET}"
        else
          DEVICE_NAME=""
        fi
        echo "DEVICE_NAME=$DEVICE_NAME" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: 整理并上传固件
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets
        TARGET_DIR=$(find . -mindepth 2 -maxdepth 2 -type d | head -1)
        if [ -z "$TARGET_DIR" ]; then
          echo "未找到固件输出目录！"
          exit 1
        fi
        cd "$TARGET_DIR"
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件到 GitHub Actions
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    # 以下是清理任务，会自动删除旧的 Workflow 运行记录和 Release，以释放仓库空间
    - name: 删除旧的 Workflow 运行记录
      uses: GitRML/delete-workflow-runs@main
      with:
        retain_days: 1
        keep_minimum_runs: 3

    - name: 删除旧的 Release
      uses: dev-drprasad/delete-older-releases@v0.3.4
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 3
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
