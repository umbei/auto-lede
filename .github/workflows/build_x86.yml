# 描述: 通过 GitHub Actions 自动编译 OpenWrt 固件

name: 编译 OpenWrt 固件

on:
  # 仓库触发
  repository_dispatch:

# 取消正在进行的运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # 源码配置
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  
  # 文件配置
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  FEEDS_CONF: feeds.conf.default
  
  # 上传配置
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: false
  
  # 系统配置
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    
    # 编译超时时间（6小时）
    timeout-minutes: 360

    steps:
    # 步骤1: 检出代码
    - name: 检出代码
      uses: actions/checkout@v4

    # 步骤2: 初始化编译环境
    - name: 初始化编译环境
      run: |
        sudo apt-get update
        sudo apt-get upgrade -y
        sudo apt-get install -y \
          build-essential \
          gcc g++ \
          make cmake \
          flex bison \
          gawk \
          gettext \
          git \
          libncurses5-dev \
          libssl-dev \
          python3 python3-dev \
          rsync \
          swig \
          unzip \
          wget \
          zlib1g-dev \
          file \
          time \
          ccache
        sudo apt-get autoremove --purge -y
        sudo apt-get clean
        sudo timedatectl set-timezone "$TZ"

    # 步骤3: 创建缓存目录
    - name: 创建编译目录
      run: |
        mkdir -p /home/runner/openwrt
        mkdir -p /home/runner/ccache

    # 步骤4: 缓存下载的源码包
    - name: 缓存下载目录
      uses: actions/cache@v3
      with:
        path: /home/runner/openwrt/dl
        key: ${{ runner.os }}-dl-${{ hashFiles('openwrt/.config') }}
        restore-keys: |
          ${{ runner.os }}-dl-

    # 步骤5: 缓存编译缓存
    - name: 缓存编译文件
      uses: actions/cache@v3
      with:
        path: /home/runner/ccache
        key: ${{ runner.os }}-ccache-${{ hashFiles('openwrt/.config') }}
        restore-keys: |
          ${{ runner.os }}-ccache-

    # 步骤6: 克隆源码
    - name: 克隆源码
      run: |
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH /home/runner/openwrt
        ln -sf /home/runner/openwrt $GITHUB_WORKSPACE/openwrt

    # 步骤7: 加载自定义 feeds
    - name: 加载自定义 feeds
      run: |
        [ -e $FEEDS_CONF ] && cp $FEEDS_CONF openwrt/feeds.conf.default
        [ -e $DIY_P1_SH ] && chmod +x $DIY_P1_SH && cd openwrt && $GITHUB_WORKSPACE/$DIY_P1_SH

    # 步骤8: 更新 feeds
    - name: 更新 feeds
      run: cd openwrt && ./scripts/feeds update -a

    # 步骤9: 安装 feeds
    - name: 安装 feeds
      run: cd openwrt && ./scripts/feeds install -a

    # 步骤10: 加载自定义配置
    - name: 加载自定义配置
      run: |
        [ -e files ] && cp -r files openwrt/files
        [ -e .config ] && cp .config openwrt/.config || echo "使用默认配置"
        [ -e $DIY_P2_SH ] && chmod +x $DIY_P2_SH && cd openwrt && $GITHUB_WORKSPACE/$DIY_P2_SH

    # 步骤11: 下载软件包
    - name: 下载软件包
      id: download
      run: |
        cd openwrt
        
        # 生成配置
        make defconfig
        
        # 下载软件包
        make download -j$(nproc)
        
        # 清理无效下载
        find dl -size -1024c -exec rm -f {} \;
        
        echo "下载完成，软件包数量: $(find dl -type f | wc -l)"

    # 步骤12: 编译固件
    - name: 编译固件
      id: compile
      run: |
        cd openwrt
        
        # 设置 ccache（如果已安装）
        if command -v ccache &> /dev/null; then
          export PATH="/usr/lib/ccache:$PATH"
          export CCACHE_DIR="/home/runner/ccache"
          ccache -s
        else
          echo "ccache 未安装，跳过缓存加速"
        fi
        
        # 显示编译信息
        echo "CPU核心数: $(nproc)"
        echo "开始编译时间: $(date '+%Y-%m-%d %H:%M:%S')"
        
        # 开始编译
        START_TIME=$(date +%s)
        make -j$(nproc) || make -j1 || make -j1 V=s
        END_TIME=$(date +%s)
        
        # 编译耗时
        COST_TIME=$((END_TIME - START_TIME))
        echo "编译完成时间: $(date '+%Y-%m-%d %H:%M:%S')"
        echo "编译耗时: $((COST_TIME / 60)) 分 $((COST_TIME % 60)) 秒"
        
        # 检查编译结果
        if [ -d bin/targets ]; then
          echo "status=success" >> $GITHUB_OUTPUT
          
          # 获取设备名称
          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
          echo "FILE_DATE=_$(date +'%Y%m%d%H%M')" >> $GITHUB_ENV
        else
          echo "status=failed" >> $GITHUB_OUTPUT
          echo "编译失败！"
          exit 1
        fi
        
        # 显示缓存统计
        if command -v ccache &> /dev/null; then
          ccache -s
        fi

    # 步骤13: 检查磁盘空间
    - name: 检查磁盘空间
      if: always()
      run: |
        echo "磁盘使用情况:"
        df -hT

    # 步骤14: 上传完整 bin 目录
    - name: 上传 bin 目录
      uses: actions/upload-artifact@v4
      if: steps.compile.outputs.status == 'success'
      with:
        name: openwrt-bin-${{ env.FILE_DATE }}
        path: openwrt/bin
        retention-days: 7

    # 步骤15: 整理固件文件
    - name: 整理固件文件
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && steps.compile.outputs.status == 'success'
      run: |
        # 查找固件目录
        if [ -d "openwrt/bin/targets" ]; then
          cd openwrt/bin/targets
          # 进入第一级目录
          for dir in */; do
            if [ -d "$dir" ]; then
              cd "$dir"
              # 进入第二级目录（排除 packages）
              for subdir in */; do
                if [ -d "$subdir" ] && [ "$subdir" != "packages/" ]; then
                  cd "$subdir"
                  rm -rf packages 2>/dev/null || true
                  echo "FIRMWARE=$PWD" >> $GITHUB_ENV
                  echo "status=success" >> $GITHUB_OUTPUT
                  echo "固件目录: $PWD"
                  echo "固件列表:"
                  ls -lh *.bin *.img *.gz *.trx 2>/dev/null || echo "未找到固件文件"
                  break 2
                fi
              done
            fi
          done
        else
          echo "错误：找不到编译产物目录"
          exit 1
        fi

    # 步骤16: 上传固件
    - name: 上传固件
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success'
      with:
        name: openwrt-firmware-${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}
        retention-days: 7

    # 步骤17: 创建 Release
    - name: 创建 Release
      uses: softprops/action-gh-release@v1
      if: env.UPLOAD_RELEASE == 'true' && steps.compile.outputs.status == 'success'
      with:
        tag_name: openwrt-${{ env.FILE_DATE }}
        name: OpenWrt 固件 ${{ env.FILE_DATE }}
        body: |
          ## 自动编译的 OpenWrt 固件
          
          ### 编译信息
          - 编译时间: $(date '+%Y-%m-%d %H:%M:%S')
          - 源码分支: ${{ env.REPO_BRANCH }}
          
          ### 固件说明
          - 固件保存在 Artifacts 中，可下载附件
          - 刷机有风险，请谨慎操作
          
          ### 注意事项
          - 建议刷机前备份原固件
          - 首次刷机建议不保留配置
        files: ${{ env.FIRMWARE }}/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # 步骤18: 清理旧的工作流运行记录
    - name: 清理旧记录
      uses: GitRML/delete-workflow-runs@main
      with:
        retain_days: 30
        keep_minimum_runs: 5

    # 步骤19: 清理旧的 Release
    - name: 清理旧 Release
      uses: dev-drprasad/delete-older-releases@v0.3.2
      if: env.UPLOAD_RELEASE == 'true'
      with:
        keep_latest: 3
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
# Description: Build OpenWrt using GitHub Actions
#

name: Build-lede-x86

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'

env:
  REPO_URL: https://github.com/gq32g/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: false
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Check Server Performance
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf "/usr/local/share/boost"
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
        echo "警告⚠"
        echo "分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
        echo -e "已知CPU型号（降序）：8370C，8272CL，8171M，E5-2673 \n"
        echo "--------------------------CPU信息--------------------------"
        echo "CPU物理数量：$(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
        echo -e "CPU核心信息：$(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c) \n"
        echo "--------------------------内存信息--------------------------"
        echo "已安装内存详细信息："
        echo -e "$(sudo lshw -short -C memory | grep GiB) \n"
        echo "--------------------------硬盘信息--------------------------"
        echo "硬盘数量：$(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt update -y
        sudo apt full-upgrade -y
        sudo apt install g++-10-multilib gcc-10-multilib
        sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
        bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext \
        git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev \
        libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev \
        libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 \
        python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo \
        uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo apt-get install clang
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        gcc --version
        g++ --version
        
    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Free up disk space
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo mkdir -p -m 777 /mnt/openwrt/dl /mnt/openwrt/bin /mnt/openwrt/staging_dir
        ln -sf /mnt/openwrt/dl openwrt/dl
        ln -sf /mnt/openwrt/bin openwrt/bin
        ln -sf /mnt/openwrt/staging_dir openwrt/staging_dir
        
    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: SSH connection to Actions
      uses: P3TERX/ssh2actions@v1.0.0
      if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh  != 'false') || contains(github.event.action, 'ssh')
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    - name: Download package
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >>$GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Upload bin directory
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >>$GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Upload firmware to release
      uses: softprops/action-gh-release@v1
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: Delete workflow runs
      uses: GitRML/delete-workflow-runs@main
      with:
        retain_days: 1
        keep_minimum_runs: 3

    - name: Remove old Releases
      uses: dev-drprasad/delete-older-releases@master
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 3
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}        
